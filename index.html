<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating Images</title>

  <link rel="icon" type="image/webp" href="images.webp" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fce5f1, #ffffff, #fff3c9);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .floating-img {
      position: absolute;
      display: block;
      height: auto;
      cursor: pointer;

      /* No box/card around image */
      background: transparent;
      padding: 0;
      border: none;
      border-radius: 0;

      filter: drop-shadow(0 20px 25px rgba(0, 0, 0, 0.28));
      animation: float 3s ease-in-out infinite;
      transition: filter 0.3s ease;
      z-index: 2;
    }

    .floating-img:hover {
      filter: drop-shadow(0 28px 35px rgba(0, 0, 0, 0.38));
    }

    .img-one {
      width: 340px;
      top: 15%;
      left: 8%;
      animation-delay: 0s;
    }

    .img-two {
      width: 440px;
      top: 58%;
      left: 38%;
      animation-delay: 0.7s;
    }

    .img-three {
      width: 360px;
      top: 20%;
      right: 8%;
      animation-delay: 1.3s;
    }

    .floating-img.expanded {
      position: fixed;
      top: 50%;
      left: 50%;
      right: auto;
      width: auto;
      height: auto;
      max-width: 85vw;
      max-height: 85vh;
      animation: none;
      transform: translate(-50%, -50%);
      z-index: 1000;
      filter: drop-shadow(0 35px 55px rgba(0, 0, 0, 0.65));
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 999;
    }

    .overlay.active {
      display: block;
    }

    @keyframes float {
      0% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-32px);
      }
      100% {
        transform: translateY(0);
      }
    }

    @media (max-width: 800px) {
      .img-one {
        width: 230px;
        top: 10%;
        left: 8%;
      }

      .img-two {
        width: 280px;
        top: 45%;
        left: 22%;
      }

      .img-three {
        width: 240px;
        top: 68%;
        right: 8%;
      }

      .floating-img.expanded {
        max-width: 90vw;
        max-height: 80vh;
      }
    }
  </style>
</head>

<body>
  <div class="overlay" id="overlay"></div>

  <main class="page">
    <img src="IMG_9555.jpg" alt="Floating Image 1" class="floating-img img-one" />
    <img src="jeremy.png" alt="Floating Image 2" class="floating-img img-two" />
    <img src="jeremy2.png" alt="Floating Image 3" class="floating-img img-three" />
  </main>

  <script>
    const images = document.querySelectorAll(".floating-img");
    const overlay = document.getElementById("overlay");

    images.forEach((img) => {
      img.addEventListener("click", () => {
        const alreadyExpanded = img.classList.contains("expanded");

        images.forEach((image) => image.classList.remove("expanded"));
        overlay.classList.remove("active");

        if (!alreadyExpanded) {
          img.classList.add("expanded");
          overlay.classList.add("active");
        }
      });
    });

    overlay.addEventListener("click", () => {
      images.forEach((img) => img.classList.remove("expanded"));
      overlay.classList.remove("active");
    });
  </script>
</body>
</html>
