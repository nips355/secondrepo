<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating Images</title>

  <link rel="icon" type="image/webp" href="images.webp" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #ffe6f2, #ffffff, #fff1cc);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .floating-img {
      position: absolute;
      width: 250px;
      height: 250px;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.8);
      padding: 10px;
      border-radius: 28px;
      cursor: pointer;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.22);
      animation: float 3s ease-in-out infinite;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      z-index: 2;
    }

    .floating-img:hover {
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.32);
    }

    .img-one {
      top: 18%;
      left: 8%;
      animation-delay: 0s;
    }

    .img-two {
      top: 55%;
      left: 40%;
      animation-delay: 0.6s;
    }

    .img-three {
      top: 24%;
      right: 9%;
      animation-delay: 1.2s;
    }

    .floating-img.expanded {
      position: fixed;
      top: 50%;
      left: 50%;
      right: auto;
      width: 75vw;
      height: 75vh;
      max-width: 850px;
      max-height: 850px;
      object-fit: contain;
      background: white;
      padding: 18px;
      border-radius: 30px;
      animation: none;
      transform: translate(-50%, -50%);
      z-index: 1000;
      box-shadow: 0 35px 90px rgba(0, 0, 0, 0.55);
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 999;
    }

    .overlay.active {
      display: block;
    }

    @keyframes float {
      0% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-28px);
      }
      100% {
        transform: translateY(0);
      }
    }

    @media (max-width: 800px) {
      .floating-img {
        width: 170px;
        height: 170px;
      }

      .img-one {
        top: 12%;
        left: 8%;
      }

      .img-two {
        top: 45%;
        left: 30%;
      }

      .img-three {
        top: 68%;
        right: 8%;
      }

      .floating-img.expanded {
        width: 88vw;
        height: 70vh;
      }
    }
  </style>
</head>

<body>
  <div class="overlay" id="overlay"></div>

  <main class="page">
    <img src="IMG_9555.jpg" alt="Floating Image 1" class="floating-img img-one" />
    <img src="jeremy.png" alt="Floating Image 2" class="floating-img img-two" />
    <img src="jeremy2.png" alt="Floating Image 3" class="floating-img img-three" />
  </main>

  <script>
    const images = document.querySelectorAll(".floating-img");
    const overlay = document.getElementById("overlay");

    images.forEach((img) => {
      img.addEventListener("click", () => {
        const alreadyExpanded = img.classList.contains("expanded");

        images.forEach((image) => image.classList.remove("expanded"));
        overlay.classList.remove("active");

        if (!alreadyExpanded) {
          img.classList.add("expanded");
          overlay.classList.add("active");
        }
      });
    });

    overlay.addEventListener("click", () => {
      images.forEach((img) => img.classList.remove("expanded"));
      overlay.classList.remove("active");
    });
  </script>
</body>
</html>
